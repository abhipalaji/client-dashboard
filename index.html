<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCrest | Client Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#2563eb', secondary: '#1e293b' } }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-secondary min-h-screen flex flex-col font-sans">
    
    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <svg class="h-8 w-8 text-primary mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                    <span class="font-bold text-2xl tracking-tight text-slate-800">CodeCrest</span>
                </div>
                <div class="flex items-center gap-3">
                    <a href="login.html" class="text-slate-600 hover:text-primary px-4 py-2 rounded-md text-sm font-semibold transition-colors">Login</a>
                    <a href="signup.html" class="bg-primary hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm font-semibold transition-all shadow-md shadow-blue-500/20 hover:shadow-blue-500/40">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <!-- Background Ornaments -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-50 rounded-full blur-3xl opacity-70 -z-10"></div>
        
        <div class="max-w-3xl mx-auto text-center fade-in">
            <span class="inline-block py-1 px-3 rounded-full bg-blue-100 text-primary text-sm font-semibold mb-6">Agency Portal</span>
            <h1 class="text-4xl tracking-tight font-extrabold text-slate-900 sm:text-5xl md:text-6xl mb-6 leading-tight">
                Client Dashboard
            </h1>
            <p class="mt-3 text-lg text-slate-500 sm:text-xl md:mt-5 md:max-w-2xl mx-auto mb-10 leading-relaxed">
                Welcome to your command center. Manage your web development projects efficiently, track progress, and collaborate seamlessly with our team.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="signup.html" class="w-full sm:w-auto flex items-center justify-center px-8 py-3.5 border border-transparent text-base font-semibold rounded-lg text-white bg-primary hover:bg-blue-700 md:text-lg shadow-lg shadow-blue-500/30 transition-all hover:-translate-y-0.5">
                    Start a New Project
                </a>
                <a href="login.html" class="w-full sm:w-auto flex items-center justify-center px-8 py-3.5 border-2 border-slate-200 text-base font-semibold rounded-lg text-slate-700 bg-white hover:bg-slate-50 hover:border-slate-300 md:text-lg transition-all">
                    Access Portal
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <div class="flex items-center mb-4">
                <svg class="h-6 w-6 text-slate-400 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                </svg>
                <span class="font-bold text-lg tracking-tight text-slate-400">CodeCrest</span>
            </div>
            <p class="text-center text-sm text-slate-500">&copy; 2026 CodeCrest Web Agency. All rights reserved.</p>
        </div>
    </footer>

    <!-- Firebase Auth state observer (redirects if already logged in) -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
