<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCrest | Create Account</title>
    
    <script>
        if (window.location.hostname === "127.0.0.1") {
            window.location.hostname = "localhost";
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#2563eb', secondary: '#1e293b' } }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-secondary min-h-screen flex flex-col font-sans">

    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl z-10 border border-slate-100 relative">

            <div>
                <div class="flex justify-center mt-2">
                    <div class="p-3 bg-blue-50 rounded-xl">
                        <svg class="h-10 w-10 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                    </div>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">Create your account</h2>
                <p class="mt-2 text-center text-sm text-slate-600">
                    Already have an account?
                    <a href="login.html" class="font-bold text-primary hover:text-blue-700 transition-colors">Sign in instead</a>
                </p>
            </div>

            <form id="signup-form" class="mt-8 space-y-5">
                <div class="space-y-4">
                    <div>
                        <label for="signup-email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                        <input id="signup-email" name="email" type="email" required
                            class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm"
                            placeholder="you@company.com">
                    </div>
                    <div>
                        <label for="signup-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input id="signup-password" name="password" type="password" required
                            class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm"
                            placeholder="Min. 6 characters">
                    </div>
                </div>

                <div class="pt-2">
                    <button id="signup-btn" type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30">
                        Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>

</html>
