<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCrest | Sign In</title>
    <script>
        if (window.location.hostname === "127.0.0.1") {
            window.location.hostname = "localhost";
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#2563eb', secondary: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-slate-50 text-secondary min-h-screen flex flex-col font-sans">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl z-10 border border-slate-100 relative">
            <div>
                <div class="flex justify-center mt-2">
                    <div class="p-3 bg-blue-50 rounded-xl">
                        <svg class="h-10 w-10 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                        </svg>
                    </div>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900">Welcome back</h2>
                <p class="mt-2 text-center text-sm text-slate-600">
                    New to CodeCrest? <a href="signup.html" class="font-bold text-primary hover:text-blue-700 transition-colors">Create an account</a>
                </p>
            </div>

            <form id="login-form" class="mt-8 space-y-5">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                        <input id="email" name="email" type="email" required class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary" placeholder="you@company.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input id="password" name="password" type="password" required class="appearance-none relative block w-full px-4 py-3 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Enter password">
                    </div>
                </div>
                <div class="pt-2 space-y-4">
                    <button id="login-btn" type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30">Sign in</button>
                    <div class="relative flex py-2 items-center">
                        <div class="flex-grow border-t border-slate-200"></div>
                        <span class="flex-shrink mx-4 text-xs text-slate-400 uppercase tracking-wider font-semibold">or</span>
                        <div class="flex-grow border-t border-slate-200"></div>
                    </div>
                    <button id="btn-passkey-login" type="button" class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-slate-200 text-sm font-bold rounded-xl text-slate-700 bg-white hover:bg-slate-50 transition-all">
                        <svg class="h-5 w-5 text-primary flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        Sign in with Passkey
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
